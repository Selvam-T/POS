<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#54596E" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Outer eye -->
  <path
    d="M8 256
       Q142 112 256 112
       Q380 112 504 256
       Q380 400 256 400
       Q142 400 8 256 Z"
    fill="#FFD578"
    stroke="#54596E"
    stroke-width="16"
    stroke-linejoin="round"
    filter="url(#soft-shadow)"/>

  <!-- Inner white eye -->
  <path
    d="M46 256
       Q156 154 256 154
       Q354 154 466 256
       Q354 358 256 358
       Q156 358 46 256 Z"
    fill="#FFFFFF"
    stroke="#54596E"
    stroke-width="12"
    stroke-linejoin="round"/>

  <!-- Upper inner lash/outline -->
  <path
    d="M64 252
       Q156 168 256 168
       Q354 168 448 252"
    fill="none"
    stroke="#54596E"
    stroke-width="14"
    stroke-linecap="round"/>

  <!-- Lower inner lash/outline -->
  <path
    d="M78 281
       Q164 340 256 340
       Q348 340 428 281"
    fill="none"
    stroke="#54596E"
    stroke-width="14"
    stroke-linecap="round"/>

  <!-- Iris ring -->
  <circle cx="256" cy="256" r="96" fill="#55A6FF" stroke="#54596E" stroke-width="14"/>

  <!-- Pupil -->
  <circle cx="256" cy="256" r="58" fill="#54596E"/>

  <!-- Highlight -->
  <circle cx="210" cy="216" r="20" fill="#FFFFFF"/>
</svg>
